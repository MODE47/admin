media:
  input: portfolio
  output: /portfolio
  categories: ["image"]

content:
  - name: projects
    label: Projects
    type: data
    file: projects.json
    fields:
      - name: projects
        label: Projects List
        type: list
        fields:
          - { name: title, label: Title, type: string, required: true }
          - { name: description, label: Description, type: text, required: true }
          - name: category
            label: Category
            type: select
            options:
              - { value: solar, label: Sustainable Energy Solutions }
              - { value: safety, label: Safety and PPE }
              - { value: agriculture, label: Agriculture }
              - { value: civil, label: Civil & Real Estate }
              - { value: energy, label: Renewable Energy & PUEs }
          - { name: image, label: Main Image, type: image, required: true }
          - { name: fullImage, label: Full-size Image (optional), type: image, required: false }