media:
  input: portfolio
  output: /portfolio

collections:
  - name: projects
    label: Projects
    label_singular: Project
    folder: .
    create: true
    file: projects.json
    fields:
      - name: projects
        label: Projects List
        widget: list
        fields:
          - { name: title, label: Title, widget: string }
          - { name: description, label: Description, widget: text }
          - name: category
            label: Category
            widget: select
            options:
              - solar
              - safety
              - agriculture
              - civil
              - energy
          - { name: image, label: Image, widget: image }
          - { name: fullImage, label: Full Image (optional), widget: image, required: false }